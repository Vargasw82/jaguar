<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shot Jaguar · México Salvando al Jaguar 2026</title>
<link rel="icon" type="image/png" href="../MSAJ_FavIco.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark-olive: #4b5020;
    --olive: #828b37;
    --black: #000000;
    --white: #fefefe;
    --gold: #c8a84e;
    --accent-green: #a4b044;
    --orange: #d4842a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--black);
    color: var(--white);
    overflow-x: hidden;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  .sj-header {
    padding: 20px 24px 0;
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 10;
  }
  .sj-logo {
    height: 48px;
    width: auto;
    opacity: 0.92;
  }

  /* ---- Main content ---- */
  .sj-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px 20px;
    gap: 0;
  }

  /* ---- Gracias ---- */
  .sj-gracias {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 96px);
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 20px;
    background: linear-gradient(90deg, var(--gold) 0%, #f5e6a3 40%, var(--gold) 70%, #f5e6a3 100%);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2.8s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { background-position: 300% center; }
    100% { background-position: 0% center; }
  }

  /* ---- Photo area ---- */
  .sj-photo-wrapper {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 3 / 4;
    overflow: hidden;
  }

  .sj-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .sj-photo.active {
    opacity: 1;
  }

  /* Subtle gold frame line */
  .sj-photo-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(200, 168, 78, 0.25);
    pointer-events: none;
    z-index: 2;
  }

  /* Photo counter */
  .sj-counter {
    position: absolute;
    bottom: 12px;
    right: 14px;
    z-index: 3;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(254,254,254,0.5);
    background: rgba(0,0,0,0.4);
    padding: 3px 8px;
  }

  /* ---- Hashtag badge ---- */
  .sj-badge {
    margin-top: 24px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--gold);
    background: rgba(200,168,78,0.08);
    border: 1px solid rgba(200,168,78,0.2);
    padding: 5px 14px;
  }
  .sj-badge-dot {
    width: 6px; height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ---- Message ---- */
  .sj-message {
    margin-top: 16px;
    max-width: 420px;
    text-align: center;
  }
  .sj-message p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(15px, 4vw, 18px);
    line-height: 1.65;
    color: rgba(254,254,254,0.78);
  }
  .sj-message p strong {
    font-style: normal;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  /* ---- Action buttons ---- */
  .sj-actions {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }

  .btn-donar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: 'Oswald', sans-serif;
    background: var(--olive);
    color: var(--white);
    padding: 18px 32px;
    border: none;
    font-size: 17px;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.25s;
    cursor: pointer;
    min-height: 58px;
  }
  .btn-donar:hover, .btn-donar:active {
    background: var(--accent-green);
    transform: translateY(-2px);
  }

  .btn-home {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Oswald', sans-serif;
    background: transparent;
    color: rgba(254,254,254,0.7);
    padding: 16px 32px;
    border: 1px solid rgba(254,254,254,0.2);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 400;
    text-decoration: none;
    transition: all 0.25s;
    cursor: pointer;
    min-height: 52px;
  }
  .btn-home:hover, .btn-home:active {
    border-color: var(--gold);
    color: var(--gold);
  }

  .btn-icon {
    width: 16px;
    height: 16px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* ---- Footer ---- */
  .sj-footer {
    padding: 16px 24px 20px;
    text-align: center;
  }
  .sj-footer p {
    font-size: 11px;
    color: rgba(254,254,254,0.2);
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ---- Desktop tweaks ---- */
  @media (min-width: 600px) {
    .sj-main {
      padding: 40px 40px 28px;
    }
    .sj-actions {
      flex-direction: row;
      max-width: 480px;
    }
    .btn-donar, .btn-home {
      flex: 1;
    }
  }

  @media (min-width: 900px) {
    .sj-photo-wrapper {
      max-width: 540px;
    }
  }
</style>
</head>
<body>

  <!-- Header -->
  <header class="sj-header">
    <a href="../index.html">
      <img class="sj-logo" src="../LogoGreyscaleWebsite.png" alt="México Salvando al Jaguar">
    </a>
  </header>

  <!-- Main -->
  <main class="sj-main">

    <!-- Gracias -->
    <div class="sj-gracias">¡GRACIAS!</div>

    <!-- Photo carousel -->
    <div class="sj-photo-wrapper" id="photoWrapper">
      <!-- Images injected by JS -->
      <span class="sj-counter" id="counter"></span>
    </div>

    <!-- Badge -->
    <div class="sj-badge">
      <span class="sj-badge-dot"></span>
      #ShotJaguar
    </div>

    <!-- Message -->
    <div class="sj-message">
      <p>Cada <strong>Shot Jaguar</strong> que compras, protege al jaguar y a su hábitat. Gracias a ti, esta voz salvaje sigue libre.</p>
    </div>

    <!-- CTAs -->
    <div class="sj-actions">
      <a class="btn-donar" href="https://gofund.me/153706751" target="_blank" rel="noopener">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 4.539 3.55 2 6.75 2c1.898 0 3.614.9 4.75 2.302C12.636 2.9 14.352 2 16.25 2 19.45 2 22 4.539 22 7.191c0 4.105-5.37 8.863-11 14.402z"/></svg>
        Donar Ahora
      </a>
      <a class="btn-home" href="../index.html">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Ir al Home
      </a>
    </div>

  </main>

  <!-- Footer -->
  <footer class="sj-footer">
    <p>México Salvando al Jaguar · 2026</p>
  </footer>

<script>
  const photos = [
    '../shot_jaguar/Chuz_Captura_May2023.jpg',
    '../shot_jaguar/Cria1.png',
    '../shot_jaguar/Cria2.png',
    '../shot_jaguar/David_Captura_May2023.png',
    '../shot_jaguar/Pedro.jpg',
    '../shot_jaguar/Regina_Captura_May2023.png',
    '../shot_jaguar/Sol.jpg',
    '../shot_jaguar/Tony_Gemini.png',
    '../shot_jaguar/Veronica_Gemini.png'
  ];

  // Shuffle Fisher-Yates
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const wrapper = document.getElementById('photoWrapper');
  const counter = document.getElementById('counter');
  let order = shuffle(photos);
  let current = 0;

  // Create all img elements
  const imgs = order.map((src, i) => {
    const img = document.createElement('img');
    img.className = 'sj-photo';
    img.src = src;
    img.alt = 'Shot Jaguar';
    img.loading = i === 0 ? 'eager' : 'lazy';
    wrapper.insertBefore(img, counter);
    return img;
  });

  function showPhoto(index) {
    imgs.forEach(img => img.classList.remove('active'));
    imgs[index].classList.add('active');
    counter.textContent = `${index + 1} / ${imgs.length}`;
  }

  function next() {
    current = (current + 1) % imgs.length;
    // Re-shuffle when we complete a full cycle
    if (current === 0) {
      order = shuffle(photos);
      order.forEach((src, i) => { imgs[i].src = src; });
    }
    showPhoto(current);
  }

  showPhoto(0);
  setInterval(next, 5000);
</script>
</body>
</html>
